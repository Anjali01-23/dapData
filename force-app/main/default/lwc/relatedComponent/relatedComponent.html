<!-- Ye Normal for:each se Different H

Normally tum likhti ho:

<template for:each={item.records} for:item="rec">

Isme:
✅ sirf current record milta h.

BUT:
❌ index nahi milta.

iterator Kya Deta H?
<template iterator:it={item.records}>

Ye har loop me ek object deta h jiska naam:

it

h.

it ke andar kya kya hota h?

Har iteration me:

it = {
   value : currentRecord,
   index : currentIndex,
   first : true/false,
   last : true/false
}
Example

Suppose:

item.records = [
   { Id:'101' },
   { Id:'102' }
]
First Iteration
it = {
   value : { Id:'101' },
   index : 0,
   first : true,
   last : false
}
Second Iteration
it = {
   value : { Id:'102' },
   index : 1,
   first : false,
   last : true
}
Ab HTML Samjho
This Line
Contact {it.index}

Matlab:

Contact 0
Contact 1
This Line
{it.value.Id}

Matlab:

Current record ka Id
Key Kya H?
key={it.value.Id}

LWC ko unique identifier chahiye hota h loop me.

To:

first record key = 101
second key = 102
Final Visual

Suppose:

records = [
   { Id:'A1' },
   { Id:'A2' }
]

Output:

Contact 0
RecordId : A1

Contact 1
RecordId : A2
Extra Useful Things
First Record Check
<template if:true={it.first}>
Last Record Check
<template if:true={it.last}>

Useful for:

borders
spacing
special styling 🙂
to ye true and false kya h

Haan 🙂
first aur last iterator ke special boolean properties hote h.

Boolean means:

true  = yes
false = no
Example

Suppose:

records = [
   { Id:'A1' },
   { Id:'A2' },
   { Id:'A3' }
]
First Iteration
it = {
   index : 0,
   first : true,
   last : false
}

Kyuki:
✅ ye first record h
❌ last nahi.

Second Iteration
it = {
   index : 1,
   first : false,
   last : false
}

Kyuki:
❌ first nahi
❌ last bhi nahi.

Third Iteration
it = {
   index : 2,
   first : false,
   last : true
}

Kyuki:
✅ ye last record h.

Use Kaha Hota?
Example 1 — First Record Par Heading
<template if:true={it.first}>
    <h1>Contacts</h1>
</template>

Ye sirf first record ke liye chalega.

Example 2 — Last Record Par HR Hide
<template if:false={it.last}>
    <hr>
</template>

Matlab:

last record ke neeche line mat dikhao.
Final Understanding
Property	Meaning
it.first	Current item first h kya
it.last	Current item last h kya
true	Haan
false	Nahi -->
