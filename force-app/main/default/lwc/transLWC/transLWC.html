 <br>

<!-- How refreshApex works
refreshApex is a Salesforce LWC helper that refreshes wired Apex data.
In your component, @wire(getData) and others store the response object in this.wholedata, this.a1, etc.
Calling refreshApex(this.wholedata) tells LWC to re-run that wire request and fetch fresh data from the server.
This updates the component’s UI with the latest values after you insert or delete records.

How Promise.all works
Promise.all([...]) waits for multiple asynchronous operations to finish.
You create an array of promises, here refreshPromises.
Each refreshApex(...) call returns a promise, so you push it into the array.
await Promise.all(refreshPromises) waits until all refreshes complete.

Why this is useful
It refreshes all the wired data at once.
If every refresh succeeds, the code continues and logs Refresh complete.
If any refresh fails, Promise.all throws and the catch block handles the error.

In short
refreshApex reloads wire data from Salesforce.
Promise.all waits for all refresh calls to finish together. -->
